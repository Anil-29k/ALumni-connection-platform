<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Feedback Survey</title>
    <link rel="stylesheet" href="feed-survey.css">
</head>
<body>
    <header>
        <h1>Project Feedback Survey</h1>
    </header>
    <main>
        <section class="survey-form">
            <h2>Project Feedback Survey</h2>
            <p>We appreciate your feedback on our recent projects. Your insights help us improve.</p>
            <form action="submit-survey-project-feedback.php" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required><br>
                
                <label for="project-feedback">Feedback on Recent Projects:</label>
                <textarea id="project-feedback" name="project-feedback" rows="4" placeholder="Your Feedback" required></textarea><br>
                
                <label for="suggestions">Suggestions for Future Projects:</label>
                <textarea id="suggestions" name="suggestions" rows="4" placeholder="Your Suggestions"></textarea><br>
                
                <button type="submit">Submit Survey</button>
            </form>
        </section>
    </main>
    <footer>
    </footer>
</body>
</html>
