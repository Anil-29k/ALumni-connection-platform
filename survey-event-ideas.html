<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Events Ideas Survey</title>
    <link rel="stylesheet" href="feed-survey.css">
</head>
<body>
    <header>
        <h1>Upcoming Events Ideas Survey</h1>
    </header>
    <main>
        <section class="survey-form">
            <h2>Upcoming Events Ideas Survey</h2>
            <p>We want to hear your ideas for upcoming events. Your input helps us plan better activities.</p>
            <form action="submit-survey-event-ideas.php" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required><br>
                
                <label for="event-ideas">Ideas for Upcoming Events:</label>
                <textarea id="event-ideas" name="event-ideas" rows="4" placeholder="Your Ideas" required></textarea><br>
                
                <button type="submit">Submit Survey</button>
            </form>
        </section>
    </main>
    <footer>
    </footer>
</body>
</html>
